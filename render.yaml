services:
  - type: web
    name: rifa-app
    env: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    autoDeploy: true

  - type: pserv
    name: rifa-db
    env: postgres
    plan: free
    ipAllowList: []
    envVars:
      - key: POSTGRES_DB
        value: rifa_db
      - key: POSTGRES_USER
        value: rifa_user
